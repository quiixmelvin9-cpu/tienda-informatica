<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tienda Informatica GT</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
  <header class="topbar">
    <div>
      <h1>Tienda Informatica GT</h1>
      <p>Catalogo de componentes y perifericos para computadora</p>
    </div>
    <div class="topbar-controls">
      <label class="switch-wrap" for="themeToggle">
        <span>Modo</span>
        <input type="checkbox" id="themeToggle" />
        <span class="switch"></span>
      </label>

      <label for="currencySelect">Moneda</label>
      <select id="currencySelect">
        <option value="GTQ">Quetzales (Q)</option>
        <option value="USD">Dolares (USD)</option>
      </select>
    </div>
  </header>

  <main class="layout">
    <section>
      <h2>Catalogo</h2>
      <div class="products" id="productsContainer"></div>
    </section>

    <aside class="cart-panel">
      <h2>Carrito</h2>
      <ul id="cartItems"></ul>

      <div class="summary">
        <p><strong>Total:</strong> <span id="cartTotal">Q0.00</span></p>
      </div>

      <div class="actions">
        <button id="clearCartBtn" class="btn btn-secondary">Vaciar carrito</button>
        <button id="checkoutBtn" class="btn btn-primary">Pagar</button>
      </div>

      <form id="paymentForm" class="payment-form" novalidate>
        <h3>Datos de pago</h3>
        <label>
          Nombre completo
          <input type="text" id="cardName" placeholder="Ej. Juan Perez" autocomplete="cc-name" required />
        </label>
        <label>
          Numero de tarjeta
          <input type="text" id="cardNumber" maxlength="19" inputmode="numeric" pattern="[0-9 ]*" autocomplete="cc-number" placeholder="1234 5678 9012 3456" required />
        </label>
        <div class="inline-fields">
          <label>
            Fecha (MM/AA)
            <input type="text" id="cardExpiry" maxlength="5" inputmode="numeric" autocomplete="cc-exp" placeholder="08/29" required />
          </label>
          <label>
            CVV
            <input type="text" id="cardCvv" maxlength="4" inputmode="numeric" autocomplete="cc-csc" placeholder="123" required />
          </label>
        </div>
        <button type="submit" class="btn btn-success">Validar pago y generar factura PDF</button>
      </form>
    </aside>
  </main>

  <footer>
    <small>Simulacion educativa de ecommerce de informatica - Precios base en Quetzales</small>
  </footer>

  <div id="productModal" class="product-modal hidden" aria-hidden="true">
    <div class="modal-overlay" id="modalOverlay"></div>
    <div class="modal-box" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <button id="closeModalBtn" class="modal-close" aria-label="Cerrar detalle">x</button>
      <div class="modal-grid">
        <section class="modal-gallery">
          <div id="modalThumbs" class="modal-thumbs"></div>
          <img id="modalMainImage" class="modal-main-image" src="" alt="Imagen principal del producto" />
        </section>

        <section class="modal-info">
          <h3 id="modalTitle"></h3>
          <p id="modalSku" class="modal-sku"></p>
          <p id="modalRating" class="modal-rating"></p>
          <p class="modal-availability">Disponible para <span id="modalBadge" class="badge"></span>.</p>

          <div class="modal-price-line">
            <span id="modalPrice" class="price-current"></span>
            <span id="modalOldPrice" class="price-old"></span>
          </div>

          <div class="delivery-card">
            <strong>Opciones de entrega</strong>
            <p id="modalDeliveryMain"></p>
            <p id="modalDeliveryAlt"></p>
          </div>

          <h4>Caracteristicas</h4>
          <ul id="modalFeatures" class="modal-features"></ul>

          <button id="modalAddBtn" class="btn btn-primary">Agregar al carrito</button>
        </section>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
